<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0e0e" />
  <title>Offline — VEDHA</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: max(1.5rem, env(safe-area-inset-top)) max(1.5rem, env(safe-area-inset-right)) max(1.5rem, env(safe-area-inset-bottom)) max(1.5rem, env(safe-area-inset-left));
      font-family: Inter, -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #0e0e0e;
      color: #f4f4f2;
      text-align: center;
    }
    main { display: grid; gap: 1.25rem; justify-items: center; max-width: 22rem; }
    img { width: min(40vw, 7.5rem); height: auto; opacity: 0.9; }
    h1 { font-size: clamp(1.6rem, 5vw, 2rem); font-weight: 600; letter-spacing: -0.03em; }
    p { color: rgba(244, 244, 242, 0.62); line-height: 1.5; font-size: 0.95rem; }
    button {
      margin-top: 0.5rem;
      min-height: 44px;
      padding: 0.75rem 1.4rem;
      border: none;
      border-radius: 999px;
      background: #f4f4f2;
      color: #0e0e0e;
      font: inherit;
      font-weight: 500;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <img src="/icons/icon-192.png" alt="VEDHA" width="192" height="192" />
    <h1>You’re offline</h1>
    <p>Check your connection, then try again. Cached pages may still be available.</p>
    <button type="button" onclick="location.reload()">Try again</button>
  </main>
</body>
</html>
